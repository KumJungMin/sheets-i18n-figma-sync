<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sheets i18n Sync</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 16px; display: grid; gap: 12px; }
      .field { display: grid; gap: 6px; }
      label { font-size: 12px; font-weight: 600; }
      input, select, button { width: 100%; box-sizing: border-box; padding: 8px; font-size: 12px; }
      .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      #status { min-height: 18px; font-size: 12px; white-space: pre-wrap; color: #374151; }
      #status.error { color: #b91c1c; }
      #status.success { color: #065f46; }
      .hint { font-size: 11px; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="field">
      <label for="sheetUrl">Google Sheets URL / CSV URL / Sheet ID</label>
      <input id="sheetUrl" type="text" placeholder="https://docs.google.com/spreadsheets/d/{SHEET_ID}/..." />
      <div class="hint">Fetch runs in plugin context to avoid UI CORS restrictions.</div>
    </div>

    <div class="field">
      <label for="lang">Language</label>
      <select id="lang"></select>
      <div class="hint" id="langHint">Fetch first to load language columns.</div>
    </div>

    <div class="actions">
      <button id="fetchBtn">Fetch</button>
      <button id="applyBtn">Apply</button>
      <button id="exportBtn">Export JSON</button>
    </div>

    <div id="status"></div>

    <script>
      const sheetUrlInput = document.getElementById('sheetUrl');
      const langSelect = document.getElementById('lang');
      const langHint = document.getElementById('langHint');
      const statusEl = document.getElementById('status');
      const fetchBtn = document.getElementById('fetchBtn');
      const applyBtn = document.getElementById('applyBtn');
      const exportBtn = document.getElementById('exportBtn');

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = type || 'success';
      }

      function setLanguageOptions(languages) {
        langSelect.innerHTML = '';
        for (let i = 0; i < languages.length; i += 1) {
          const lang = languages[i];
          const option = document.createElement('option');
          option.value = lang;
          option.textContent = lang;
          langSelect.appendChild(option);
        }
        langHint.textContent = languages.length ? `Detected languages: ${languages.join(', ')}` : 'No language columns found.';
      }

      function normalizeInput(value) {
        return String(value || '').trim().replace(/^['"\s]+|['"\s]+$/g, '');
      }

      function extractSheetInfo(inputValue) {
        const input = normalizeInput(inputValue);
        if (!input) return null;

        const idMatch = input.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
        const gidMatch = input.match(/[?#&]gid=([0-9]+)/);
        if (idMatch) {
          return { sheetId: idMatch[1], gid: gidMatch ? gidMatch[1] : '0' };
        }

        if (/^[a-zA-Z0-9-_]{20,}$/.test(input)) {
          return { sheetId: input, gid: '0' };
        }

        return null;
      }

      function gvizJsonpUrl(sheetId, gid) {
        return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid || '0'}`;
      }

      function fetchSheetViaJsonp(sheetId, gid) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          const timeout = setTimeout(() => {
            cleanup();
            reject(new Error('JSONP request timed out. Check sheet sharing and gid.'));
          }, 10000);

          const prevGoogle = window.google;

          function cleanup() {
            clearTimeout(timeout);
            if (script.parentNode) script.parentNode.removeChild(script);
            if (prevGoogle === undefined) {
              try { delete window.google; } catch (e) { window.google = undefined; }
            } else {
              window.google = prevGoogle;
            }
          }

          window.google = window.google || {};
          window.google.visualization = window.google.visualization || {};
          window.google.visualization.Query = window.google.visualization.Query || {};
          window.google.visualization.Query.setResponse = (payload) => {
            cleanup();
            resolve(payload);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('Failed to load Google Sheets JSONP response.'));
          };

          script.src = gvizJsonpUrl(sheetId, gid);
          document.body.appendChild(script);
        });
      }

      function parseGvizPayload(payload) {
        if (!payload || !payload.table || !payload.table.cols || !payload.table.rows) {
          throw new Error('Invalid GViz response. Ensure the sheet is public.');
        }

        const cols = payload.table.cols;
        const rows = payload.table.rows;

        const normalize = (v) => String(v || '').replace(/^﻿/, '').trim().toLowerCase();
        let normalizedHeaders = cols.map((c) => normalize(c && c.label));
        let dataStartIndex = 0;

        let keyIndex = normalizedHeaders.indexOf('key');

        // Some GViz responses do not populate column labels from header row.
        // In that case use the first row as header fallback.
        if (keyIndex < 0 && rows.length > 0) {
          const headerCells = rows[0].c || [];
          normalizedHeaders = [];
          for (let i = 0; i < cols.length; i += 1) {
            const cell = headerCells[i];
            normalizedHeaders.push(normalize(cell && cell.v != null ? String(cell.v) : ''));
          }
          keyIndex = normalizedHeaders.indexOf('key');
          if (keyIndex >= 0) dataStartIndex = 1;
        }

        if (keyIndex < 0) {
          throw new Error('Sheet must have a key column.');
        }

        const langCols = [];
        for (let i = 0; i < normalizedHeaders.length; i += 1) {
          if (i === keyIndex) continue;
          if (normalizedHeaders[i]) langCols.push({ index: i, lang: normalizedHeaders[i] });
        }
        if (!langCols.length) throw new Error('Sheet must have at least one language column.');

        const translations = {};
        for (let r = dataStartIndex; r < rows.length; r += 1) {
          const cells = rows[r].c || [];
          const keyCell = cells[keyIndex];
          const key = keyCell && keyCell.v != null ? String(keyCell.v).trim() : '';
          if (!key) continue;

          const entry = {};
          for (let j = 0; j < langCols.length; j += 1) {
            const col = langCols[j];
            const cell = cells[col.index];
            entry[col.lang] = cell && cell.v != null ? String(cell.v) : '';
          }
          translations[key] = entry;
        }

        return { translations, languages: langCols.map((x) => x.lang) };
      }

      function downloadJson(filename, jsonText) {
        const blob = new Blob([jsonText], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      fetchBtn.addEventListener('click', async function () {
        const info = extractSheetInfo(sheetUrlInput.value);
        if (!info) {
          setStatus('Invalid Google Sheets URL / CSV URL / Sheet ID.', 'error');
          return;
        }

        setStatus('Fetching via Google GViz JSONP...', 'success');
        try {
          const payload = await fetchSheetViaJsonp(info.sheetId, info.gid);
          const parsed = parseGvizPayload(payload);
          setLanguageOptions(parsed.languages);
          parent.postMessage({ pluginMessage: { type: 'set-translations', payload: parsed } }, '*');
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Fetch failed', 'error');
        }
      });

      applyBtn.addEventListener('click', function () {
        if (!langSelect.value) {
          setStatus('No language available. Click Fetch first.', 'error');
          return;
        }

        parent.postMessage({
          pluginMessage: {
            type: 'apply-translations',
            payload: { lang: langSelect.value },
          },
        }, '*');
      });

      exportBtn.addEventListener('click', function () {
        parent.postMessage({ pluginMessage: { type: 'export-json' } }, '*');
      });

      onmessage = function (event) {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === 'error') {
          setStatus(msg.payload, 'error');
          return;
        }

        if (msg.type === 'set-translations-success') {
          const languages = Array.isArray(msg.payload.languages) ? msg.payload.languages : [];
          setLanguageOptions(languages);
          setStatus(`Loaded ${msg.payload.count} keys.`, 'success');
          return;
        }

        if (msg.type === 'apply-result') {
          const r = msg.payload;
          setStatus(`Done. total TEXT=${r.totalTextNodes}, applied=${r.appliedCount}, missing key=${r.skippedMissingKey}, missing value=${r.skippedMissingValue}`, 'success');
          return;
        }

        if (msg.type === 'export-json-result') {
          const files = msg.payload.files || {};
          Object.entries(files).forEach(function (entry) {
            downloadJson(entry[0], entry[1]);
          });
          setStatus(`Downloaded ${Object.keys(files).length} JSON file(s).`, 'success');
        }
      };
    </script>
  </body>
</html>
